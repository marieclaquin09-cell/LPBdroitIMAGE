// ── INDEXEDDB ─────────────────────────────────────────────────────
const DB_NAME='lpb_offline';const DB_VERSION=2;
let db=null;

function openDB(){
  return new Promise((res,rej)=>{
    if(db){res(db);return;}
    const req=indexedDB.open(DB_NAME,DB_VERSION);
    req.onupgradeneeded=e=>{
      const d=e.target.result;
      if(!d.objectStoreNames.contains('residents')){
        d.createObjectStore('residents',{keyPath:'id'});
      }
      if(!d.objectStoreNames.contains('pending')){
        // Recueils en attente de sync
        const s=d.createObjectStore('pending',{keyPath:'local_id',autoIncrement:true});
        s.createIndex('synced','synced',{unique:false});
      }
      if(!d.objectStoreNames.contains('recueils_cache')){
        d.createObjectStore('recueils_cache',{keyPath:'id'});
      }
    };
    req.onsuccess=e=>{db=e.target.result;res(db);};
    req.onerror=()=>rej(req.error);
  });
}

async function idbGetAll(store){
  const d=await openDB();
  return new Promise((res,rej)=>{
    const tx=d.transaction(store,'readonly');
    const req=tx.objectStore(store).getAll();
    req.onsuccess=()=>res(req.result);
    req.onerror=()=>rej(req.error);
  });
}

async function idbPut(store,item){
  const d=await openDB();
  return new Promise((res,rej)=>{
    const tx=d.transaction(store,'readwrite');
    const req=tx.objectStore(store).put(item);
    req.onsuccess=()=>res(req.result);
    req.onerror=()=>rej(req.error);
  });
}

async function idbPutAll(store,items){
  const d=await openDB();
  return new Promise((res,rej)=>{
    const tx=d.transaction(store,'readwrite');
    const s=tx.objectStore(store);
    items.forEach(item=>s.put(item));
    tx.oncomplete=()=>res();
    tx.onerror=()=>rej(tx.error);
  });
}

async function idbDelete(store,key){
  const d=await openDB();
  return new Promise((res,rej)=>{
    const tx=d.transaction(store,'readwrite');
    const req=tx.objectStore(store).delete(key);
    req.onsuccess=()=>res();
    req.onerror=()=>rej(req.error);
  });
}

async function idbClear(store){
  const d=await openDB();
  return new Promise((res,rej)=>{
    const tx=d.transaction(store,'readwrite');
    const req=tx.objectStore(store).clear();
    req.onsuccess=()=>res();
    req.onerror=()=>rej(req.error);
  });
}

function ConflictResolver({conflicts,onResolve}){

  const c=conflicts[0]; // On traite un par un
  const fmt=r=>new Date(r.date+'T12:00:00').toLocaleDateString('fr-FR',{day:'numeric',month:'long'})+' · '+(r.activite||'sans activité');
  return h('div',{className:'conflict-overlay'},

      h('div',{className:'conflict-sub'},

      ),
      h('div',{className:'conflict-item'},

        h('div',{style:{fontSize:'0.75rem',color:'var(--gris)'}},fmt(c.local)),
        h('div',{className:'conflict-actions'},
          h('button',{className:'btn-keep',onClick:()=>onResolve('keep',c)},'✅ Garder'),
          h('button',{className:'btn-discard',onClick:()=>onResolve('discard',c)},'🗑 Ignorer')
        )
      )
    )
  );
}

// ── PAGE RECUEIL ──────────────────────────────────────────────────
function PageRecueil({session,residents,onSaved,showToast,isOnline}){
  const [mode,setMode]=useState('selection');
  const [selIds,setSelIds]=useState([]);
  const [appel,setAppel]=useState({});
  const [activite,setActivite]=useState('');
  const [date,setDate]=useState(new Date().toISOString().split('T')[0]);
  const [consents,setConsents]=useState({});
  const [saving,setSaving]=useState(false);

  useEffect(()=>{const a={};residents.forEach(r=>a[r.id]='present');setAppel(a);},[residents]);

  function toggleSel(id){
    setSelIds(prev=>{
      const next=prev.includes(id)?prev.filter(x=>x!==id):[...prev,id];
      if(!prev.includes(id)){setConsents(c=>c[id]?c:{...c,[id]:{photo:false,interne:false,externe:false,ext_detail:'',obs:''}});}
      return next;
    });
  }
  function toggleAppel(id){setAppel(p=>({...p,[id]:p[id]==='present'?'absent':'present'}));}
  const updateC=useCallback((id,field,val)=>{setConsents(p=>({...p,[id]:{...p[id],[field]:val}}));},[]);
  const presentsAppel=residents.filter(r=>appel[r.id]==='present');
  const presentsList=mode==='appel'?presentsAppel:residents.filter(r=>selIds.includes(r.id));

  async function saveAll(){
    if(!presentsList.length){showToast('⚠️ Aucune personne sélectionnée');return;}
    if(!activite.trim()){showToast("⚠️ Renseignez l'activité");return;}
    setSaving(true);
    const rows=presentsList.map(r=>{
      const c=consents[r.id]||{photo:false,interne:false,externe:false,ext_detail:'',obs:''};
      return{resident_id:r.id,date,activite,photo:c.photo?'oui':'non',interne:c.interne?'oui':'non',externe:c.externe?'oui':'non',ext_detail:c.ext_detail||null,obs:c.obs||null,pro:session?.pro,etab:session?.etab};
    });

    if(isOnline){
      // En ligne : envoi direct
      const{error}=await sb.from('recueils').insert(rows);
      setSaving(false);
      if(error){showToast('❌ '+error.message);return;}
      showToast('✅ Enregistré en ligne');
    } else {
      // Hors ligne : stockage local en attente
      for(const row of rows){
        await idbPut('pending',{...row,synced:false,local_id:undefined,saved_at:new Date().toISOString(),
          // On garde le resident en local pour l'affichage
          residents:{prenom:residents.find(r=>r.id===row.resident_id)?.prenom,initiale:residents.find(r=>r.id===row.resident_id)?.initiale}
        });
      }
      setSaving(false);
      showToast('💾 Sauvegardé hors ligne — sera synchronisé à la reconnexion');
    }
    onSaved();setSelIds([]);setConsents({});setActivite('');
  }

  function ConsentZone({r,zoneClass}){
    const c=consents[r.id]||{photo:false,interne:false,externe:false,ext_detail:'',obs:''};
    return h('div',{className:'consent-zone '+(zoneClass||'')},
      [{key:'photo',label:'📷 Photo / vidéo'},{key:'interne',label:'🏠 Diffusion interne'},{key:'externe',label:'🌐 Diffusion externe'}]
        .map(({key,label})=>h('div',{key,className:'toggle-line'},
          h('span',{className:'toggle-lbl'},label),
          h('div',{style:{display:'flex',alignItems:'center'}},
            h(Toggle,{checked:!!c[key],onChange:e=>updateC(r.id,key,e.target.checked)}),
            h('span',{className:c[key]?'t-oui':'t-non'},c[key]?'Oui':'Non')
          )
        )),
      c.externe&&h(ExtDetailInput,{residentId:r.id,initialValue:c.ext_detail||'',onCommit:val=>updateC(r.id,'ext_detail',val)})
    );
  }

  if(!session) return h('div',{className:'page'},h('div',{className:'empty'},h('div',{className:'ico'},'🏠'),h('p',null,"Retournez à l'accueil")));

  return h('div',{className:'page'},
    h('div',{className:'session-banner'},
      h('span',{className:'badge'},session.etab),
      h('span',{className:'banner-txt'},session.pro+' · '+new Date(date).toLocaleDateString('fr-FR',{day:'numeric',month:'long'})),
      !isOnline&&h('span',{className:'badge-offline'},'📴 Hors ligne')
    ),
    h('div',{className:'act-row'},h('label',{className:'slabel'},"Activité du jour"),h('input',{className:'inp',type:'text',placeholder:'Ex : Sortie au parc…',value:activite,onChange:e=>setActivite(e.target.value)})),
    h('div',{className:'act-row'},h('label',{className:'slabel'},'Date'),h('input',{className:'inp',type:'date',value:date,onChange:e=>setDate(e.target.value)})),
    h('div',{className:'mode-toggle'},
      h('button',{className:'mode-btn'+(mode==='selection'?' active':''),onClick:()=>setMode('selection')},'☑️ Sélection manuelle'),
      h('button',{className:'mode-btn'+(mode==='appel'?' active':''),onClick:()=>setMode('appel')},'📋 Appel (cocher absents)')
    ),
    residents.length===0&&h('div',{className:'empty'},h('div',{className:'ico'},'👥'),h('p',null,"Aucune personne enregistrée pour "+session.etab+".")),
    mode==='selection'&&residents.length>0&&h('div',null,residents.map(r=>{
      const sel=selIds.includes(r.id);
      return h('div',{key:r.id,className:'r-card '+(sel?'sel-card':'unsel-card')},
        h('div',{className:'r-row',onClick:()=>toggleSel(r.id)},
          h('div',{className:'r-check'+(sel?' chk':'')},sel?'✓':''),
          h('span',{className:'r-name'},r.prenom+' '+r.initiale+'.'),
          sel&&h('span',{style:{marginLeft:'auto',fontSize:'0.7rem',color:'var(--or)',fontWeight:600}},'▼ consentements')
        ),
        sel&&h(ConsentZone,{r,zoneClass:''})
      );
    })),
    mode==='appel'&&residents.length>0&&h('div',null,
      h('div',{className:'info-box'},'ℹ️ ',h('span',null,'Tous présents par défaut. Tapez pour marquer absent.')),
      residents.map(r=>{
        const pres=(appel[r.id]||'present')==='present';
        const ini=(r.prenom?.[0]||'')+(r.initiale?.[0]||'');
        return h('div',{key:r.id,className:'r-card '+(pres?'present-card':'absent-card')},
          h('div',{className:'r-row',onClick:()=>toggleAppel(r.id)},
            h('div',{className:'r-avatar'+(pres?' pres':'')},ini),
            h('div',{className:'r-name'},r.prenom+' ',h('strong',null,r.initiale+'.')),
            h('span',{className:'status-badge '+(pres?'status-pres':'status-abs'),style:{marginLeft:'auto'}},pres?'Présent ✓':'Absent')
          ),
          pres&&h(ConsentZone,{r,zoneClass:'pres-zone'})
        );
      })
    ),
    presentsList.length>0&&h('div',{style:{marginTop:8}},
      h('div',{className:'info-box'},'ℹ️ ',h('span',null,h('strong',null,presentsList.length+' personne(s)'),' seront '+(isOnline?'enregistrées en ligne.':'sauvegardées hors ligne.'))),
      h('button',{className:'btn-primary',onClick:saveAll,disabled:saving},saving?h('span',{className:'spinner'}):('💾 '+(isOnline?'Enregistrer':'Sauvegarder hors ligne')+' ('+presentsList.length+' pers.)'))
    )
  );
}

// ── PAGE RÉSIDENTS ────────────────────────────────────────────────
function PageResidents({residents,onChanged,showToast,isOnline}){
  const [search,setSearch]=useState('');
  const [filterEtab,setFilterEtab]=useState('');
  const [form,setForm]=useState({prenom:'',initiale:'',etab:''});

      ),
      h('div',{className:'form-row'},
        h('label',{className:'slabel'},'Établissement'),
        h('select',{className:'sel-inp',value:form.etab,onChange:e=>setForm(p=>({...p,etab:e.target.value}))},
          h('option',{value:''},'Choisir…'),ETABS.map(e=>h('option',{key:e,value:e},e+' — '+ETAB_LABELS[e]))
        )
      ),
      h('button',{className:'btn-add',onClick:addR,disabled:saving||!isOnline},saving?h('span',{className:'spinner'}):'➕ Ajouter',!isOnline&&h('span',{style:{fontSize:'0.7rem',opacity:0.7}},' (connexion requise)'))
    ),
    h('div',{className:'search-wrap'},h('span',{className:'search-ico'},'🔍'),h('input',{type:'text',placeholder:'Rechercher…',value:search,onChange:e=>setSearch(e.target.value)})),
    h('div',{className:'chips'},
      h('span',{className:'chip'+(filterEtab===''?' active':''),onClick:()=>setFilterEtab('')},'Tous',h('span',{className:'count-pill'},residents.length)),
      ETABS.map(e=>{const n=residents.filter(r=>r.etab===e).length;return n>0?h('span',{key:e,className:'chip'+(filterEtab===e?' active':''),onClick:()=>setFilterEtab(e)},e,h('span',{className:'count-pill'},n)):null;})
    ),
    filtered.length===0&&h('div',{className:'empty'},h('div',{className:'ico'},'👤'),h('p',null,'Aucune personne trouvée')),
    filtered.map(r=>h('div',{key:r.id,className:'res-card'},

      h('span',{className:'res-etab'},r.etab),

// ── PAGE HISTORIQUE ───────────────────────────────────────────────
function PageHistorique({recueils,pendingCount,onChanged,showToast,isOnline}){
  const [fEtab,setFEtab]=useState('');
  const [fPrenom,setFPrenom]=useState('');
  const [fDu,setFDu]=useState('');
  const [fAu,setFAu]=useState('');
  const [selected,setSelected]=useState(new Set());
  const [expanded,setExpanded]=useState(new Set());
  const hasFiltres=fEtab||fPrenom||fDu||fAu;
  const iStyle={border:'1px solid var(--creme-dark)',borderRadius:'var(--radius)',padding:'9px 12px',fontSize:'0.82rem',background:'var(--blanc)',color:'var(--brun)',outline:'none',width:'100%'};
  const filtered=recueils.filter(r=>{
    return(!fEtab||r.etab===fEtab)&&(!fPrenom||(r.residents?.prenom||'').toLowerCase().includes(fPrenom.toLowerCase()))&&(!fDu||r.date>=fDu)&&(!fAu||r.date<=fAu);
  });
  const groups=[];const groupMap={};
  filtered.forEach(r=>{
    const key=r.date+'||'+(r.activite||'');
    if(!groupMap[key]){groupMap[key]={key,date:r.date,activite:r.activite||'',items:[]};groups.push(groupMap[key]);}
    groupMap[key].items.push(r);
  });
  groups.sort((a,b)=>b.date.localeCompare(a.date));
  useEffect(()=>{if(groups.length>0&&expanded.size===0){setExpanded(new Set([groups[0].key]));}},[recueils]);
  const allFilteredIds=filtered.map(r=>r.id);
  const allSelected=allFilteredIds.length>0&&allFilteredIds.every(id=>selected.has(id));
  function toggleSelectAll(){if(allSelected){setSelected(p=>{const n=new Set(p);allFilteredIds.forEach(id=>n.delete(id));return n;});}else{setSelected(p=>{const n=new Set(p);allFilteredIds.forEach(id=>n.add(id));return n;});}}
  function toggleItem(id){setSelected(p=>{const n=new Set(p);n.has(id)?n.delete(id):n.add(id);return n;});}
  function toggleGroup(key){setExpanded(p=>{const n=new Set(p);n.has(key)?n.delete(key):n.add(key);return n;});}
  async function delItem(id){
    if(!confirm('Supprimer cet enregistrement ?'))return;
    if(!isOnline){showToast('⚠️ Connexion requise pour supprimer');return;}
    const{error}=await sb.from('recueils').delete().eq('id',id);
    if(error){showToast('❌ '+error.message);return;}
    setSelected(p=>{const n=new Set(p);n.delete(id);return n;});
    showToast('🗑️ Supprimé');onChanged();
  }
  const selectedItems=filtered.filter(r=>selected.has(r.id));
  function exportCSV(){
    const toExport=selectedItems.length>0?selectedItems:filtered;
    if(!toExport.length){showToast('⚠️ Aucun enregistrement à exporter');return;}
    const rows=[['Date','Établissement','Prénom','Initiale','Activité','Photo','Interne','Externe','Détail externe','Obs','Professionnel'],
      ...toExport.map(r=>[r.date,r.etab,r.residents?.prenom||'',r.residents?.initiale||'',r.activite||'',r.photo,r.interne,r.externe,r.ext_detail||'',r.obs||'',r.pro||''])];
    const csv=rows.map(r=>r.map(c=>'"'+String(c).replace(/"/g,'""')+'"').join(';')).join('\n');
    const blob=new Blob(['\uFEFF'+csv],{type:'text/csv;charset=utf-8;'});
    const url=URL.createObjectURL(blob);
    const a=document.createElement('a');a.href=url;a.download='droitimage_'+(selectedItems.length>0?'selection_':'')+new Date().toISOString().split('T')[0]+'.csv';a.click();
    URL.revokeObjectURL(url);
  }
  return h('div',{className:'page'},
    pendingCount>0&&h('div',{className:'info-box',style:{background:'rgba(192,57,43,0.08)',borderColor:'rgba(192,57,43,0.3)'}},
      '📴 ',h('span',null,h('strong',null,pendingCount+' recueil'+(pendingCount>1?'s':'')),' sauvegardé'+(pendingCount>1?'s':'')+' hors ligne — en attente de synchronisation')
    ),
    h('div',{className:'filter-box'},
      h('div',{className:'filter-hdr'},h('span',null,'🔍 Filtres'),hasFiltres&&h('button',{className:'btn-reset',onClick:()=>{setFEtab('');setFPrenom('');setFDu('');setFAu('');}}, '✕ Réinitialiser')),
      h('div',{className:'f2'},
        h('div',null,h('label',{className:'slabel'},'Établissement'),h('select',{style:{...iStyle,appearance:'none'},value:fEtab,onChange:e=>setFEtab(e.target.value)},h('option',{value:''},'Tous'),ETABS.map(e=>h('option',{key:e,value:e},e)))),
        h('div',null,h('label',{className:'slabel'},'Prénom'),h('input',{style:iStyle,type:'text',placeholder:'Rechercher…',value:fPrenom,onChange:e=>setFPrenom(e.target.value)}))
      ),
      h('div',null,h('label',{className:'slabel'},'Période'),h('div',{className:'f2'},h('input',{style:iStyle,type:'date',value:fDu,onChange:e=>setFDu(e.target.value)}),h('input',{style:iStyle,type:'date',value:fAu,onChange:e=>setFAu(e.target.value)})))
    ),
    h('div',{className:'export-bar'},
      h('span',{className:'export-count'},h('strong',null,filtered.length),' enregistrement'+(filtered.length>1?'s':''),selectedItems.length>0&&h('span',null,' · ',h('strong',null,selectedItems.length),' sélectionné'+(selectedItems.length>1?'s':''))),
      h('button',{className:'btn-sel-all',onClick:toggleSelectAll},allSelected?'☐ Tout décocher':'☑ Tout sélectionner'),
      h('button',{className:'btn-export',onClick:exportCSV,disabled:filtered.length===0},'📥 '+(selectedItems.length>0?'Exporter sélection ('+selectedItems.length+')':'Exporter tout'))
    ),
    filtered.length===0&&h('div',{className:'empty'},h('div',{className:'ico'},'📋'),h('p',null,'Aucun enregistrement trouvé')),
    groups.map(g=>{
      const isOpen=expanded.has(g.key);
      return h('div',{key:g.key,className:'hist-group'},
        h('div',{className:'hist-group-header',onClick:()=>toggleGroup(g.key)},
          h('div',{style:{flex:1}},
            h('div',{className:'hist-group-title'},'📅 '+new Date(g.date+'T12:00:00').toLocaleDateString('fr-FR',{weekday:'long',day:'numeric',month:'long',year:'numeric'})),
            g.activite&&h('div',{className:'hist-group-sub'},'🎯 '+g.activite)
          ),
          h('span',{className:'hist-group-count'},g.items.length+' pers.'),
          h('span',{className:'hist-group-toggle'},isOpen?'▲':'▼')
        ),
        isOpen&&h('div',null,g.items.map(r=>{
          const isSel=selected.has(r.id);
          return h('div',{key:r.id,className:'hist-item'},
            h('div',{className:'hist-checkbox'+(isSel?' chk':''),onClick:()=>toggleItem(r.id)},isSel?'✓':''),
            h('div',{className:'hist-item-info'},
              h('div',{className:'hist-name'},(r.residents?.prenom||'?')+' '+(r.residents?.initiale||'?')+'.'),
              h('div',{className:'badges-row'},
                h('span',{className:r.photo==='oui'?'b-oui':'b-non'},'📷 '+(r.photo==='oui'?'Oui':'Non')),
                h('span',{className:r.interne==='oui'?'b-oui':'b-non'},'🏠 '+(r.interne==='oui'?'Oui':'Non')),
                h('span',{className:r.externe==='oui'?'b-oui':'b-non'},'🌐 '+(r.externe==='oui'?'Oui':'Non')),
                r.ext_detail&&h('span',{className:'b-etab'},r.ext_detail),
                r.pending&&h('span',{className:'b-pending'},'⏳ Hors ligne'),
                r.pro&&h('span',{className:'b-etab'},'👤 '+r.pro)
              ),
              r.obs&&h('div',{className:'hist-obs'},'💬 '+r.obs)
            ),
            !r.pending&&h('button',{className:'btn-del-sm',onClick:()=>delItem(r.id),title:'Supprimer'},'🗑')
          );
        }))
      );
    })
  );
}

// ── APP PRINCIPALE ────────────────────────────────────────────────
function App(){
  const [auth,setAuth]=useState(sessionStorage.getItem('lpb_auth')==='1');
  const [page,setPage]=useState('accueil');
  const [session,setSession]=useState(null);
  const [residents,setResidents]=useState([]);
  const [recueils,setRecueils]=useState([]);
  const [pending,setPending]=useState([]);
  const [isOnline,setIsOnline]=useState(navigator.onLine);
  const [syncing,setSyncing]=useState(false);
  const [conflicts,setConflicts]=useState([]);
  const [toast,setToast]=useState(null);

  function showToast(msg){setToast(msg);setTimeout(()=>setToast(null),3200);}

  // ── Chargement résidents : réseau + cache local ──────────────────
  const loadRes=useCallback(async()=>{
    if(navigator.onLine){
      const{data,error}=await sb.from('residents').select('*').order('prenom');
      if(!error&&data){
        setResidents(data);
        await idbClear('residents');
        await idbPutAll('residents',data);
      }
    } else {
      const cached=await idbGetAll('residents');
      setResidents(cached);
    }
  },[]);

  // ── Chargement recueils : réseau + pending locaux ───────────────
  const loadRec=useCallback(async()=>{
    let online=[];
    if(navigator.onLine){
      const{data,error}=await sb.from('recueils').select('*,residents(prenom,initiale,etab)').order('date',{ascending:false}).order('created_at',{ascending:false}).limit(500);
      if(!error&&data){
        online=data;
        await idbClear('recueils_cache');
        await idbPutAll('recueils_cache',data);
      }
    } else {
      online=await idbGetAll('recueils_cache');
    }
    const pend=await idbGetAll('pending');
    const pendingRows=pend.filter(p=>!p.synced).map(p=>({...p,id:'pending_'+p.local_id,pending:true}));
    setPending(pend.filter(p=>!p.synced));
    setRecueils([...pendingRows,...online]);
  },[]);

  // ── Sync des données hors ligne ─────────────────────────────────
  const syncPending=useCallback(async()=>{
    const pend=await idbGetAll('pending');
    const toSync=pend.filter(p=>!p.synced);
    if(!toSync.length) return;
    setSyncing(true);
    const newConflicts=[];
    for(const item of toSync){
      // Vérifier si un recueil existe déjà pour cette personne/date/activité
      const{data:existing}=await sb.from('recueils')
        .select('id')
        .eq('resident_id',item.resident_id)
        .eq('date',item.date)
        .eq('activite',item.activite||'')
        .maybeSingle();
      if(existing){
        // Conflit détecté
        newConflicts.push({local:item,remote:existing});
      } else {
        // Pas de conflit : on envoie
        const{local_id,synced,saved_at,residents:_r,...row}=item;
        await sb.from('recueils').insert(row);
        await idbDelete('pending',item.local_id);
      }
    }
    setSyncing(false);
    if(newConflicts.length>0){
      setConflicts(newConflicts);
    } else {
      showToast('✅ Synchronisation terminée');
      loadRec();
    }
  },[loadRec]);

  // ── Résolution des conflits ─────────────────────────────────────
  async function resolveConflict(action,conflict){
    if(action==='keep'){
      // Envoyer quand même
      const{local_id,synced,saved_at,residents:_r,...row}=conflict.local;
      await sb.from('recueils').insert(row);
    }
    // Dans les deux cas, on supprime le pending local
    await idbDelete('pending',conflict.local.local_id);
    const remaining=conflicts.slice(1);
    setConflicts(remaining);
    if(remaining.length===0){
      showToast('✅ Conflits résolus');
      loadRec();
    }
  }

  // ── Gestion de la connexion ─────────────────────────────────────
  useEffect(()=>{
    const goOnline=()=>{
      setIsOnline(true);
      showToast('📶 Connexion rétablie — synchronisation…');
      setTimeout(()=>syncPending(),1000);
    };
    const goOffline=()=>{setIsOnline(false);showToast('📴 Mode hors ligne activé');};
    window.addEventListener('online',goOnline);
    window.addEventListener('offline',goOffline);
    return()=>{window.removeEventListener('online',goOnline);window.removeEventListener('offline',goOffline);};
  },[syncPending]);

  useEffect(()=>{loadRes();loadRec();},[]);

  if(!auth) return h(Login,{onSuccess:()=>setAuth(true)});

  const residentsEtab=session?residents.filter(r=>r.etab===session.etab):[];
  const TABS=[{id:'accueil',icon:'🏠',label:'Accueil'},{id:'recueil',icon:'📋',label:'Recueil'},{id:'residents',icon:'👥',label:'Personnes'},{id:'historique',icon:'📊',label:'Historique'}];

  return h('div',null,
    // Header avec indicateur de connexion
    h('div',{className:'header'},
      h(Logo),
      h('div',null,h('div',{className:'header-title'},"Droit à l'image"),h('div',{className:'header-sub'},'Le Pré de la Bataille')),
      h('div',{className:'header-right'},
        session&&h('div',{className:'header-badge'},session.etab+' · '+session.pro),
        h('div',{className:'status-pill '+(isOnline?'on':'off')},
          h('span',{className:'online-dot '+(isOnline?'on':'off')}),
          isOnline?'En ligne':'Hors ligne'
        )
      )
    ),
    // Barre de sync si données en attente et en ligne
    pending.length>0&&isOnline&&h('div',{className:'sync-bar'},
      h('span',{className:'sync-bar-txt'},'⏳ '+pending.length+' recueil'+(pending.length>1?'s':'')+' en attente de synchronisation'),
      h('button',{className:'btn-sync',onClick:syncPending,disabled:syncing},syncing?'Sync…':'Synchroniser')
    ),
    // Résolution de conflits
    conflicts.length>0&&h(ConflictResolver,{conflicts,onResolve:resolveConflict}),
    // Nav
    h('div',{className:'nav-bar'},TABS.map(t=>h('button',{key:t.id,className:'nav-tab'+(page===t.id?' active':''),onClick:()=>setPage(t.id)},h('span',{className:'nav-icon'},t.icon),t.label))),
    // Pages
    page==='accueil'&&h(PageAccueil,{residents,onStart:(e,p)=>{setSession({etab:e,pro:p});setPage('recueil');},session}),
    page==='recueil'&&h(PageRecueil,{session,residents:residentsEtab,onSaved:()=>{loadRec();},showToast,isOnline}),
    page==='residents'&&h(PageResidents,{residents,onChanged:()=>{loadRes();loadRec();},showToast,isOnline}),
    page==='historique'&&h(PageHistorique,{recueils,pendingCount:pending.length,onChanged:loadRec,showToast,isOnline}),
    toast&&h('div',{className:'toast'},toast)
  );
}

ReactDOM.render(h(App),document.getElementById('root'));
</script>
</body>
</html>
